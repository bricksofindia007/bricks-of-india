name: Sync LEGO Catalogue

on:
  schedule:
    # Every Sunday 02:00 UTC (07:30 IST) — before weekend content work
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  sync:
    name: Rebrickable → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run catalogue sync
        env:
          REBRICKABLE_API_KEY: ${{ secrets.REBRICKABLE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-rebrickable.js

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[catalogue-sync-failed] Sync failed on ${new Date().toISOString().slice(0, 10)}`,
              body: [
                '## Catalogue sync failed',
                '',
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '**Common causes:**',
                '- `REBRICKABLE_API_KEY` expired or hit daily quota',
                '- Supabase connection issue (check `NEXT_PUBLIC_SUPABASE_URL` / `SUPABASE_SERVICE_ROLE_KEY`)',
                '- Row count assertion failed (< 5,000 rows after sync — partial fetch)',
                '',
                'Check the run log for the specific error. Re-run via Actions → Sync LEGO Catalogue → Run workflow.',
              ].join('\n'),
              labels: ['catalogue-sync-failed'],
            });
